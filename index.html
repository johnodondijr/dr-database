
  <!-- INTERACTION HOOKS TIERED INTEGRATION TO CORE APP.JS -->
  <script>
    // Local copy of account structures mapping directly to app.js values
    const STAFF_ACCOUNTS = {
      fred:      { password: 'Destiny@2025', role: 'admin',  display: 'Fred 👑' },
      robert:    { password: 'Robert@2025',  role: 'staff',  display: 'Robert'  },
      doreen:    { password: 'Doreen@2025',  role: 'staff',  display: 'Doreen'  },
      maxwell:   { password: 'Maxwell@2025', role: 'staff',  display: 'Maxwell' },
      consolata: { password: 'Consol@2025',  role: 'staff',  display: 'Consolata'},
    };
    const MASTER_KEY = 'DR-RESET-2025';

    function togglePasswordVisibility() {
      const field = document.getElementById('pass-input');
      const icon = document.getElementById('eye-icon');
      if (field.type === 'password') {
        field.type = 'text';
        icon.textContent = '🙈';
      } else {
        field.type = 'password';
        icon.textContent = '👁';
      }
    }

    function showRecoveryView() {
      document.getElementById('login-main-form').style.display = 'none';
      document.getElementById('recovery-main-view').style.display = 'block';
      document.getElementById('recovery-error-banner').style.display = 'none';
      document.getElementById('recovery-success-box').style.display = 'none';
    }

    function hideRecoveryView() {
      document.getElementById('recovery-main-view').style.display = 'none';
      document.getElementById('login-main-form').style.display = 'block';
    }

    function handleSystemLogin() {
      const u = document.getElementById('user-input').value.trim().toLowerCase();
      const p = document.getElementById('pass-input').value.trim();
      const err = document.getElementById('error-banner');

      const account = STAFF_ACCOUNTS[u];
      if (account && account.password === p) {
        err.style.display = 'none';
        
        // If embedded alongside your core app page, synchronize values instantly and bypass modal popups:
        const coreUserField = document.getElementById('username-input');
        const corePassField = document.getElementById('pw-input');
        
        if (coreUserField && corePassField && typeof window.doLogin === 'function') {
          coreUserField.value = u;
          corePassField.value = p;
          window.doLogin();
        } else {
          // Alternative fallback code route if elements are decoupled:
          sessionStorage.setItem('dr_user', JSON.stringify({ username: u, ...account }));
          const loginScreen = document.getElementById('login-screen');
          const mainAppLayout = document.getElementById('app');
          const chip = document.getElementById('user-chip');
          
          if (loginScreen) loginScreen.style.display = 'none';
          if (mainAppLayout) mainAppLayout.style.display = 'block';
          if (chip) chip.textContent = account.display;
          if (typeof window.loadAllData === 'function') window.loadAllData();
        }
      } else {
        err.style.display = 'block';
      }
    }

    function verifyAdminCode() {
      const entered = document.getElementById('recovery-code-field').value.trim();
      const fail = document.getElementById('recovery-error-banner');
      const pass = document.getElementById('recovery-success-box');

      if (entered === MASTER_KEY) {
        fail.style.display = 'none';
        pass.innerHTML = `<strong>Verification Accepted. System Credentials:</strong><br>
          • fred — Destiny@2025<br>
          • robert — Robert@2025<br>
          • doreen — Doreen@2025<br>
          • maxwell — Maxwell@2025<br>
          • consolata — Consol@2025`;
        pass.style.display = 'block';
      } else {
        pass.style.display = 'none';
        fail.style.display = 'block';
      }
    }
  </script>
</body>
</html>
