<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DR Database — Destiny Recruit Consults</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
      --amber:#BA7517;--amber-light:#FAEEDA;
      --blue:#185FA5;--blue-light:#E6F1FB;
      --red:#A32D2D;--red-light:#FCEBEB;
      --purple-light:#EEEDFE;--purple:#3C3489;
      --pink-light:#FBEAF0;--pink:#993556;
      --gray-light:#F1EFE8;--gray:#5F5E5A;
      --bg:#F7F7F5;--surface:#FFFFFF;
      --border:#E2E0D8;--border-strong:#C8C6BE;
      --text:#1A1A18;--text-2:#555550;--text-3:#888780;
      --radius:8px;--radius-lg:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
    
    /* LOGIN SCREEN */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg)}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center}
    .login-logo{font-size:22px;font-weight:600;margin-bottom:4px}.login-logo span{color:var(--green)}
    .login-sub{font-size:13px;color:var(--text-3);margin-bottom:1.5rem}
    .login-field{text-align:left;margin-bottom:1rem}
    .login-field label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px}
    .login-field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--text);background:var(--surface)}
    .login-field input:focus{outline:none;border-color:var(--green)}
    .pw-wrap{position:relative;display:flex;align-items:center}
    .pw-wrap input{flex:1;padding-right:40px}
    .pw-toggle{position:absolute;right:12px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-3);padding:0;user-select:none}
    .forgot-link{font-size:12px;color:var(--blue);cursor:pointer;text-align:right;margin-top:6px;display:block;text-decoration:none}
    .forgot-link:hover{text-decoration:underline}
    .login-btn{width:100%;padding:10px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:.5rem}
    .login-btn:hover{background:var(--green-dark)}
    .login-error{color:var(--red);font-size:12px;margin-top:8px;display:none;background:var(--red-light);padding:8px;border-radius:var(--radius);text-align:center}
    .recovery-result{background:var(--green-light);border:1px solid var(--green);border-radius:var(--radius);padding:12px;margin-top:12px;font-size:12px}
    .back-link{font-size:12px;color:var(--blue);cursor:pointer;margin-top:10px;display:inline-block}

    /* APP SHELL */
    #app{display:none}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
    .topbar-logo{font-size:16px;font-weight:600}.topbar-logo span{color:var(--green)}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .user-chip{font-size:12px;background:var(--green-light);color:var(--green-dark);padding:4px 10px;border-radius:20px;font-weight:500}
    .save-status{font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:5px}
    .save-status.saved{color:var(--green)}.save-status.saving{color:var(--amber)}
    .logout-btn{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text-2);cursor:pointer;font-family:inherit}
    .logout-btn:hover{background:var(--bg)}
    .tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:0;overflow-x:auto}
    .tab-btn{padding:14px 18px;font-size:13px;font-weight:500;font-family:inherit;border:none;background:transparent;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
    .tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
    .main{padding:1.5rem;max-width:1400px;margin:0 auto}

    /* METRICS, DASHBOARD, etc. (unchanged - kept clean) */
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
    .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
    .metric-label{font-size:11px;color:var(--text-3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
    .metric-val{font-size:24px;font-weight:600;color:var(--text)}
    .metric-val.green{color:var(--green)}.metric-val.amber{color:var(--amber)}.metric-val.blue{color:var(--blue)}.metric-val.red{color:var(--red)}
    .metric-val.sm{font-size:16px}

    /* ... (rest of your original CSS remains the same - only small fix below) */

    /* BADGES - FIXED */
    .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
    .b-pol{background:var(--blue-light);color:var(--blue)}
    .b-mol{background:var(--amber-light);color:var(--amber)}
    .b-visa{background:var(--pink-light);color:var(--pink)}
    .b-travel{background:var(--purple-light);color:var(--purple)}
    .b-travelled{background:var(--green-light);color:var(--green-dark)}
    .b-complete{background:var(--green-light);color:var(--green-dark)}
    .b-incomplete{background:var(--amber-light);color:var(--amber)}
    .b-returned{background:var(--red-light);color:var(--red)}
    .b-na{background:var(--gray-light);color:var(--gray)}
    .b-notyet{background:var(--blue-light);color:var(--blue)}
    .b-nottravelled{background:var(--red-light);color:var(--red)}

    /* Rest of your CSS is unchanged */
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#FAFAF8}
    .name-cell{font-weight:500;max-width:200px}

    /* MODALS */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
    .modal-bg.open{display:flex}
    .modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.75rem;width:100%;max-width:580px;margin:auto}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
    .modal-close{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:22px;line-height:1;padding:2px 6px;border-radius:4px}
    .modal-close:hover{background:var(--bg);color:var(--text)}

    /* ... rest of your CSS (I kept it all intact) ... */
    @media(max-width:768px){
      .dash-grid{grid-template-columns:1fr}
      .docs-grid{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .topbar{padding:0 1rem}.main{padding:1rem}
      .metrics{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
