<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment Hub Dashboard</title>
    <!-- Tailwind CSS Engine CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM Core CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Script Compiler CDN for browser-side execution -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50/50 min-h-screen">

    <!-- Root target for React application mounting -->
    <div id="root"></div>

    <!-- Application initialization context script -->
    <script type="text/babel">
        // Lucide SVG Icons constructed manually to avoid external package import errors
        const UsersIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );

        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
        );

        const PlaneIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-.9-.2-1.8.3-2.1 1.2l-.3.9 7.8 4.4L7 17l-3.3-.6-1.1.7 3.5 1.9 1.9 3.5.7-1.1-.6-3.3 3.8-3.8 4.4 7.8.9-.3c.9-.3 1.4-1.2 1.2-2.1Z"/></svg>
        );

        const BriefcaseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        );

        const WalletIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M16 12a2 2 0 0 0 0 4h5v-4z"/></svg>
        );

        const HelpIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
        );

        function DashboardApp() {
            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 font-sans antialiased text-gray-900">
                    
                    {/* HERO OVERVIEW HEADER BANNER */}
                    <div className="w-full bg-gradient-to-r from-neutral-900 via-neutral-800 to-amber-950 text-white rounded-3xl p-6 md:p-8 mb-8 shadow-md relative overflow-hidden">
                        <div className="absolute right-0 top-0 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                        <p className="text-xs font-bold tracking-widest text-amber-400 uppercase mb-2">Recruitment Hub Overview</p>
                        <h1 className="text-2xl md:text-4xl font-extrabold tracking-tight mb-2">Optimize Placements & Manage Pipeline Deliverables</h1>
                        <p className="text-gray-300 max-w-2xl text-xs md:text-sm leading-relaxed">
                            Real-time status tracking framework linked securely to cloud instances. Keep documents validated and logs audit-ready.
                        </p>
                    </div>

                    {/* MAIN APPLICATION CORE GRID */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        {/* LEFT COLUMN MODULE DATA PANELS */}
                        <div className="lg:col-span-2 space-y-8">
                            
                            {/* PROFESSIONAL SEGMENTS GROUP CONTAINER */}
                            <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                <div className="flex items-center space-x-2 border-b border-gray-100 pb-4 mb-6">
                                    <span className="p-2 bg-amber-50 rounded-lg text-amber-800">💼</span>
                                    <div>
                                        <h2 className="text-xs font-bold uppercase tracking-wider text-gray-400">Professional Segments Summary</h2>
                                        <h3 className="text-base font-bold text-gray-800">Professional Jobs</h3>
                                    </div>
                                </div>

                                {/* ALIGNED KPI GRIDS FOR PROFESSIONAL SEGMENTS SUMMARY */}
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                                    <div className="p-4 bg-blue-50/60 rounded-xl border-l-4 border-blue-500 flex items-center justify-between shadow-xs">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-blue-500">Total Candidates</p>
                                            <p className="text-xl font-black text-gray-900 mt-1">36</p>
                                        </div>
                                        <UsersIcon />
                                    </div>

                                    <div className="p-4 bg-amber-50/60 rounded-xl border-l-4 border-amber-500 flex items-center justify-between shadow-xs">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-amber-600">In Process</p>
                                            <p className="text-[10px] text-amber-500 font-medium">OL → Visa</p>
                                            <p className="text-xl font-black text-gray-900 mt-0.5">18</p>
                                        </div>
                                        <RefreshIcon />
                                    </div>

                                    <div className="p-4 bg-emerald-50/60 rounded-xl border-l-4 border-emerald-500 flex items-center justify-between shadow-xs">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-emerald-600">Travelled</p>
                                            <p className="text-xl font-black text-gray-900 mt-1">18</p>
                                        </div>
                                        <PlaneIcon />
                                    </div>
                                </div>

                                {/* REORGANIZED BILLING ROWS CONFIGURED WITH FLEX DIRECTION AND SEPARATED DATA METRICS */}
                                <div className="space-y-4 border-t border-gray-50 pt-4">
                                    <div className="space-y-1.5">
                                        <div className="flex justify-between items-center text-xs font-semibold text-gray-600">
                                            <span>Commission Billed</span>
                                            <span className="font-bold text-slate-900 tracking-wide">KES 1,445,000</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                            <div className="h-full rounded-full bg-indigo-500" style={{ width: '78%' }} />
                                        </div>
                                    </div>

                                    <div className="space-y-1.5">
                                        <div className="flex justify-between items-center text-xs font-semibold text-gray-600">
                                            <span>Outstanding Balance</span>
                                            <span className="font-bold text-rose-600 tracking-wide">KES 398,000</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                            <div className="h-full rounded-full bg-rose-500" style={{ width: '22%' }} />
                                        </div>
                                    </div>
                                </div>
                            </div>


                            {/* LB OPERATIONAL SUMMARY GROUP CONTAINER */}
                            <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                <div className="flex items-center space-x-2 border-b border-gray-100 pb-4 mb-6">
                                    <span className="p-2 bg-teal-50 rounded-lg text-teal-800">🏠</span>
                                    <div>
                                        <h2 className="text-xs font-bold uppercase tracking-wider text-gray-400">LB Operational Summary</h2>
                                        <h3 className="text-base font-bold text-gray-800">LB Jobs</h3>
                                    </div>
                                </div>

                                {/* CARDS GRID FOR LB OPERATIONAL PORTFOLIOS */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    <div className="p-4 bg-teal-50/60 rounded-xl border-l-4 border-teal-500 flex items-center justify-between shadow-xs">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-teal-600">Total Candidates</p>
                                            <p className="text-xl font-black text-gray-900 mt-1">98</p>
                                        </div>
                                        <UsersIcon />
                                    </div>

                                    <div className="p-4 bg-orange-50/60 rounded-xl border-l-4 border-orange-500 flex items-center justify-between shadow-xs">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-orange-600">In Process</p>
                                            <p className="text-[10px] text-orange-400 font-medium font-sans">PP Applied, Not Travelled</p>
                                            <p className="text-xl font-black text-gray-900 mt-0.5">36</p>
                                        </div>
                                        <BriefcaseIcon />
                                    </div>

                                    <div className="p-4 bg-cyan-50/60 rounded-xl border-l-4 border-cyan-500 flex items-center justify-between shadow-xs">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-cyan-600">Travelled</p>
                                            <p className="text-xl font-black text-gray-900 mt-1">59</p>
                                        </div>
                                        <CheckIcon />
                                    </div>

                                    <div className="p-4 bg-rose-50/60 rounded-xl border-l-4 border-rose-500 flex items-center justify-between shadow-xs">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-rose-600">Refund Balance Owed</p>
                                            <p className="text-xl font-black text-gray-900 mt-1">$1,000</p>
                                        </div>
                                        <WalletIcon />
                                    </div>

                                    <div className="p-4 bg-purple-50/60 rounded-xl border-l-4 border-purple-500 flex items-center justify-between shadow-xs sm:col-span-2">
                                        <div>
                                            <p className="text-[11px] font-bold uppercase tracking-wider text-purple-600">Incomplete Refunds</p>
                                            <p className="text-xl font-black text-gray-900 mt-1">46</p>
                                        </div>
                                        <HelpIcon />
                                    </div>
                                </div>
                            </div>

                        </div>


                        {/* RIGHT COLUMN SIDEBAR METRICS ARCHITECTURE */}
                        <div className="space-y-8">
                            
                            {/* DYNAMIC STAGE BREAKDOWNS COMPONENT */}
                            <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-5">
                                <div className="flex items-center space-x-2 border-b border-gray-50 pb-3">
                                    <span className="text-indigo-600 text-lg">📊</span>
                                    <h3 className="text-xs font-black uppercase tracking-wider text-gray-500">Dynamic Stage Breakdowns</h3>
                                </div>
                                
                                <div className="space-y-4">
                                    {[
                                        { label: 'Pending Offer Letter', count: 6, color: 'bg-amber-500' },
                                        { label: 'Pending MOL', count: 3, color: 'bg-blue-500' },
                                        { label: 'Pending Visa', count: 4, color: 'bg-indigo-500' },
                                        { label: 'Pending Travel', count: 5, color: 'bg-purple-500' },
                                        { label: 'Travelled', count: 18, color: 'bg-emerald-500' },
                                    ].map((stage, idx) => (
                                        <div key={idx} className="space-y-1.5">
                                            <div className="flex justify-between items-center text-xs font-semibold text-gray-700">
                                                <span>{stage.label}</span>
                                                <span className="font-bold text-gray-900 bg-gray-100 px-2 py-0.5 rounded-md">{stage.count}</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                                <div 
                                                    className={`h-full rounded-full ${stage.color}`} 
                                                    style={{ width: `${(stage.count / 18) * 100}%` }}
                                                />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>


                            {/* REFUND CLEARANCES & STATUSES COMPONENT */}
                            <div className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-5">
                                <div className="flex items-center space-x-2 border-b border-gray-50 pb-3">
                                    <span className="text-emerald-600 text-lg">🔄</span>
                                    <h3 className="text-xs font-black uppercase tracking-wider text-gray-500">Refund Clearances & Statuses</h3>
                                </div>

                                <div className="space-y-4">
                                    {[
                                        { label: 'Refund complete', count: 37, icon: '✅', color: 'bg-emerald-500' },
                                        { label: 'Incomplete', count: 46, icon: '⏳', color: 'bg-amber-500' },
                                        { label: 'Returned', count: 4, icon: '🔄', color: 'bg-blue-500' },
                                        { label: 'N/A (HAD PP)', count: 11, icon: '📄', color: 'bg-slate-400' },
                                        { label: 'Not yet travelled', count: 37, icon: '🕒', color: 'bg-indigo-400' },
                                        { label: 'Did not travel', count: 2, icon: '❌', color: 'bg-rose-500' },
                                    ].map((status, idx) => (
                                        <div key={idx} className="space-y-1.5">
                                            <div className="flex justify-between items-center text-xs font-semibold text-gray-700">
                                                <div className="flex items-center space-x-2">
                                                    <span className="text-sm leading-none">{status.icon}</span>
                                                    <span>{status.label}</span>
                                                </div>
                                                <span className="font-bold text-gray-900 bg-gray-50 border border-gray-100 px-2 py-0.5 rounded-md">{status.count}</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                                                <div 
                                                    className={`h-full rounded-full ${status.color}`} 
                                                    style={{ width: `${(status.count / 46) * 100}%` }}
                                                />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>

                    </div>
                </div>
            );
        }

        // Mount the initialized application straight to DOM execution block context
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<DashboardApp />);
    </script>
</body>
</html>
